name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject token
        env:
          GUESTBOOK_TOKEN: ${{ secrets.GUESTBOOK_TOKEN }}
        run: |
          sed -i "s/YOUR_FINE_GRAINED_TOKEN/${GUESTBOOK_TOKEN}/g" index.html form.html entry.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment
